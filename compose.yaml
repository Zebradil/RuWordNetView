x-logging: &default-logging
  driver: json-file
  options:
    max-file: '3'
    max-size: '10m'

services:
  app:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_HOST: database
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?}
    image: ruwordnetview:prod
    logging: *default-logging
    restart: unless-stopped

  database:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_USER: ${POSTGRES_USER:?}
    image: postgres:18.3@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data:rw

  proxy:
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:?}
      - CERTBOT_AUTHENTICATOR=dns-cloudflare
      - STAGING=0
    # Has to be built beforehand.
    # See https://github.com/Zebradil/RuWordNetView/blob/master/Makefile
    image: ruwordnetview:nginx
    logging: *default-logging
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    volumes:
      - nginx_cache:/var/cache/nginx:rw
      - nginx_secrets:/etc/letsencrypt

volumes:
  db_data:
  nginx_cache:
  nginx_secrets:

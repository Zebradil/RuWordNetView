name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    name: Go lint & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: go vet
        run: go vet -mod=mod ./...

      - name: gofmt check
        run: |
          if gofmt -l . | grep -q .; then
            echo "gofmt: the following files need formatting:"
            gofmt -l .
            exit 1
          fi

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image
        run: docker build -t ruwordnetview:prod -f docker/prod/Dockerfile .

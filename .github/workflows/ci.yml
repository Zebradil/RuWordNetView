name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    name: PHP lint & style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: intl, pdo_pgsql, zip
          tools: composer:v2, php-cs-fixer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Syntax check
        run: find app src web -name "*.php" -exec php -l {} \; | grep -v "^No syntax errors"
        # exits 0 when grep finds no output (all files OK), 1 if errors found
        # flip exit code: error only when something IS printed
        shell: bash -o pipefail {0}

      - name: PHP-CS-Fixer dry run
        run: php-cs-fixer fix --dry-run --diff --config=.php_cs.dist

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        run: docker build -t ruwordnetview:dev -f docker/dev/Dockerfile .

      - name: Build prod image
        run: docker build -t ruwordnetview:prod -f docker/prod/Dockerfile .

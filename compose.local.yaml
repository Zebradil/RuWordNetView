services:
  app-local:
    depends_on:
      database-local:
        condition: service_healthy
    environment:
      DEV_GID: 1000
      DEV_UID: 1000
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_HOST: database-local
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?}
    image: ruwordnetview:dev
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - .:/opt/app
      - /opt/app/vendor

  database-local:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_USER: ${POSTGRES_USER:?}
    healthcheck:
      interval: 5s
      retries: 10
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      timeout: 5s
    image: postgres:15.4
    ports:
      - '127.0.0.1:55432:5432'
    volumes:
      - db_data_local:/var/lib/postgresql/data:rw

volumes:
  db_data_local:

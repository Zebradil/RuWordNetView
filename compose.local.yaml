services:
  database-local:
    image: postgres:15.4
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - db_data_local:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-local:
    image: ruwordnetview:dev
    environment:
      DEV_UID: 1000
      DEV_GID: 1000
    volumes:
      - .:/opt/app
      - /opt/app/vendor
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      database-local:
        condition: service_healthy

volumes:
  db_data_local:
